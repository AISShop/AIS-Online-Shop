<style>
  :root{
    --green:#0f5132; --green-2:#0a3d26; --lime:#a7d129; --lime-2:#8bb814;
    --ink:#1c2a22; --muted:#6b7c72; --line:#e7ece9; --bg:#f4f7f5;
    --sale:#e4002b; --card:#fff; --blue:#0866ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'DBHeaventMed','Prompt',sans-serif;background:var(--bg);color:var(--ink)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .hidden{display:none !important}

  /* ============ STOREFRONT ============ */
  .util{background:var(--green-2);color:#cfe3d6;font-size:13px}
  .util .wrap{max-width:1240px;margin:0 auto;display:flex;gap:22px;align-items:center;padding:9px 20px}
  .util .left-links{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .util .right{margin-left:auto;display:flex;gap:18px;align-items:center}
  .util .pill{background:var(--lime);color:#143d22;font-weight:600;padding:2px 9px;border-radius:5px}
  .util a{cursor:pointer}

  header{background:var(--green);color:#fff;position:sticky;top:0;z-index:40;box-shadow:0 4px 12px rgba(10,40,25,.18)}
  .nav-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
  .nav-row2{background:var(--green);padding:6px 10px;display:flex;align-items:center;gap:8px}
  .nav{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:12px 16px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:26px;letter-spacing:.5px;cursor:pointer;flex-shrink:0}
  nav.menu{display:flex;gap:22px;font-weight:500;font-size:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;min-width:0}
  nav.menu::-webkit-scrollbar{display:none}
  nav.menu a{opacity:.92;transition:.2s;padding:4px 0;cursor:pointer;white-space:nowrap;flex-shrink:0}
  nav.menu a:hover{opacity:1;color:var(--lime)}
  .nav .tools{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
  .cart-btn{position:relative;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;display:grid;place-items:center;transition:.2s;flex-shrink:0}
  .cart-btn:hover{background:var(--lime);color:#143d22}
  .cart-count{position:absolute;top:-6px;right:-6px;background:var(--sale);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
  @media(max-width:560px){
    .nav{gap:10px;padding:10px 12px}
    nav.menu a{font-size:13px;gap:16px}
    nav.menu{gap:16px}

// โหลด Firebase compat แบบ async ไม่บล็อก script หลัก
function loadFirebaseCompat(){
  return new Promise((resolve)=>{
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js';
      s2.onload=()=>resolve(true);
      s2.onerror=()=>resolve(false);
      document.head.appendChild(s2);
    };
    s1.onerror=()=>resolve(false);
    document.head.appendChild(s1);
  });
}
window.AISCloud = {
  ready:false, enabled:false, _db:null, _saving:false, _onRemote:null,
  getConfig(){
    try{
      const saved = localStorage.getItem('ais_fb_config');
      if(saved) return JSON.parse(saved);
      return {
        apiKey: "AIzaSyD-ENTQbKIvtJzMFCORNBqz1IWcFf5pThU",
        authDomain: "store-207a7.firebaseapp.com",
        projectId: "store-207a7",
        storageBucket: "store-207a7.firebasestorage.app",
        messagingSenderId: "479757384853",
        appId: "1:479757384853:web:be8563fa202fd1a9746f9c"
      };
    }catch{ return null; }
  },
  saveConfig(obj){ localStorage.setItem('ais_fb_config', JSON.stringify(obj)); },
  clearConfig(){ localStorage.removeItem('ais_fb_config'); },
  async connect(){
    const cfg=this.getConfig();
    if(!cfg||!cfg.apiKey||!cfg.projectId){ this.enabled=false; this.ready=true; return false; }
    try{
      const loaded=await loadFirebaseCompat();
      if(!loaded) throw new Error('SDK load failed');
      if(!firebase.apps.length) firebase.initializeApp(cfg);
      this._db = firebase.firestore();
      this._docRef = this._db.collection('store').doc('main');
      this._visRef = this._db.collection('visitors').doc('count');
      this.enabled = true; this.ready = true;
      return true;
    }catch(e){ console.error('Firebase connect failed',e); this.enabled=false; this.ready=true; return false; }
  },
  subscribe(cb){
    if(!this.enabled||!this._docRef) return;
    this._onRemote=cb;
    this._docRef.onSnapshot((snap)=>{
      if(this._saving) return;
      if(snap.exists){
        const data=snap.data();
        if(data&&data.json) try{ cb(JSON.parse(data.json)); }catch(e){}
      }
    },(err)=>console.warn('snapshot error',err));
  },
  async save(stateObj){
    if(!this.enabled||!this._docRef) return false;
    try{
      this._saving=true;
      const json=JSON.stringify(stateObj);
      const sizeKB=Math.round(json.length/1024);
      if(sizeKB > 900){
        this._saving=false;
        console.warn(`cloud save skipped: data too large (${sizeKB} KB > 900 KB limit). Use URL for images instead of base64.`);
        return false;
      }
      await this._docRef.set({ json, updated:Date.now() });
      setTimeout(()=>{ this._saving=false; },600);
      return true;
    }catch(e){
      this._saving=false;
      console.error('cloud save failed',e);
      return false;
    }
  },
  async loadOnce(){
    if(!this.enabled||!this._docRef) return null;
    try{
      const snap=await this._docRef.get();
      if(snap.exists&&snap.data().json) return JSON.parse(snap.data().json);
    }catch(e){ console.warn('cloud load failed',e); }
    return null;
  }
};
window.AISCloudReady = Promise.resolve(false); // connect in startup()
</script>

function normalizeFb(v){
  let s=String(v||'').trim();
  if(!s) return '';
  s=s.replace(/^https?:\/\//i,'').replace(/^www\./i,'')
     .replace(/^m\.me\//i,'').replace(/^(web\.|business\.)?facebook\.com\//i,'')
     .replace(/^messenger\.com\/t\//i,'').replace(/^@/,'');
  s=s.split(/[/?#]/)[0]; // drop any path/query/hash
  return s.trim();
}

let _slideTimer=null, _slideIdx=0;
function renderHero(){ return; // disabled - hero is static HTML
  void 0;
  const hero=$('#hero'); if(!hero) return;
  const ads=(SETTINGS.ads||[]).filter(a=>a&&(a.pc||a.image||a.mobile));
  // ถ้าไม่มี ads ใน SETTINGS แต่มี HTML ฝังไว้แล้ว → ไม่ทับ
  if(!ads.length && hero.querySelector('img')) return;
  const hasText = SETTINGS.hero_show_badge||SETTINGS.hero_show_title||SETTINGS.hero_show_sub;
  let html='';

  // text block (badge / title / subtitle) — each optional
  if(hasText){
    html += `<div class="wrap">
      ${SETTINGS.hero_show_badge&&SETTINGS.hero_badge?`<span class="badge">${esc(SETTINGS.hero_badge)}</span>`:''}
      ${SETTINGS.hero_show_title&&SETTINGS.hero_title?`<h1>${esc(SETTINGS.hero_title)}</h1>`:''}
      ${SETTINGS.hero_show_sub&&SETTINGS.hero_sub?`<p>${esc(SETTINGS.hero_sub)}</p>`:''}
    </div>`;
  }

  // ad slideshow — each ad can have a PC image and an optional mobile image
  if(ads.length){
    const arrows = ads.length>1 ? `
      <button class="arrow prev" onclick="slidePrev()">‹</button>
      <button class="arrow next" onclick="slideNext()">›</button>` : '';
    const dots = ads.length>1 ? `<div class="dots">${ads.map((a,i)=>`<button class="${i===0?'on':''}" onclick="slideGo(${i})"></button>`).join('')}</div>` : '';
    const slides = ads.map((a,i)=>{
      const pc=a.pc||a.image||a.mobile, mob=a.mobile||a.pc||a.image;
      // <picture> swaps to the mobile image automatically under 560px
      const inner=`<picture>
        <source media="(max-width:560px)" srcset="${mob}">
        <img src="${pc}" alt="" style="object-fit:${SETTINGS.ads_fit==='contain'?'contain':'cover'}">
      </picture>${a.caption?`<div class="cap">${esc(a.caption)}</div>`:''}`;
      const cls=`slide ${i===0?'on':''}`;
      return a.link
        ? `<a class="${cls}" href="${esc(a.link)}" target="_blank">${inner}</a>`
        : `<div class="${cls}">${inner}</div>`;
    }).join('');
    html += `<div class="slides"><div class="track" id="slideTrack">${slides}</div>${arrows}${dots}</div>`;
  }

  // if neither text nor ads, keep a minimal spacer so header isn't naked
  if(!hasText && !ads.length) html = `<div class="wrap" style="padding:30px 20px"></div>`;

  hero.innerHTML = html;
  _slideIdx = 0;
  clearInterval(_slideTimer);
  if(ads.length>1){ _slideTimer = setInterval(slideNext, 4500); }
}
function _setSlide(i){
  const track=$('#slideTrack'); if(!track) return;
  const slides=track.querySelectorAll('.slide');
  const dots=document.querySelectorAll('.slides .dots button');
  if(!slides.length) return;
  _slideIdx=(i+slides.length)%slides.length;
  slides.forEach((s,k)=>s.classList.toggle('on',k===_slideIdx));
  dots.forEach((d,k)=>d.classList.toggle('on',k===_slideIdx));
}
function slideNext(){_setSlide(_slideIdx+1);}
function slidePrev(){_setSlide(_slideIdx-1);clearInterval(_slideTimer);_slideTimer=setInterval(slideNext,4500);}
function slideGo(i){_setSlide(i);clearInterval(_slideTimer);_slideTimer=setInterval(slideNext,4500);}

}

function renderPagination(total, totalPages){
  // ลบ pagination เก่าออกก่อน
  const old=document.getElementById('pagination');
  if(old) old.remove();
  if(totalPages<=1) return;
  const wrap=document.createElement('div');
  wrap.id='pagination';
  wrap.style.cssText='max-width:1240px;margin:0 auto 40px;padding:0 20px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap';
  // ปุ่มก่อนหน้า
  const prev=document.createElement('button');
  prev.textContent='‹ ก่อนหน้า';
  prev.className='btn alt';
  prev.style.cssText='padding:8px 16px;font-size:14px';
  prev.disabled=_page<=1;
  if(_page<=1) prev.style.opacity='.4';
  prev.onclick=()=>{_page--;renderGrid();window.scrollTo({top:$('#cats').offsetTop-80,behavior:'smooth'});};
  wrap.appendChild(prev);
  // เลขหน้า
  for(let i=1;i<=totalPages;i++){
    const btn=document.createElement('button');
    btn.textContent=i;
    btn.style.cssText='width:36px;height:36px;border-radius:8px;border:1.5px solid var(--line);background:'+(i===_page?'var(--green)':'#fff')+';color:'+(i===_page?'#fff':'var(--ink)')+';font-size:14px;font-weight:600;cursor:pointer;font-family:inherit';
    btn.onclick=(function(pg){return()=>{_page=pg;renderGrid();window.scrollTo({top:$('#cats').offsetTop-80,behavior:'smooth'});};})(i);
    wrap.appendChild(btn);
  }
  // ปุ่มถัดไป
  const next=document.createElement('button');
  next.textContent='ถัดไป ›';
  next.className='btn';
  next.style.cssText='padding:8px 16px;font-size:14px';
  next.disabled=_page>=totalPages;
  if(_page>=totalPages) next.style.opacity='.4';
  next.onclick=()=>{_page++;renderGrid();window.scrollTo({top:$('#cats').offsetTop-80,behavior:'smooth'});};
  wrap.appendChild(next);
  // แทรกหลัง #grid
  const grid=$('#grid');
  grid.parentNode.insertBefore(wrap, grid.nextSibling);
}

function addToCart(id){

  const qty=_cardQty[id]||1;
  const unit=(p.sale&&p.sale<p.price)?p.sale:p.price;

  if(ex)ex.qty+=qty; else cart.push({id:p.id,name:p.name,unit_price:unit,image:p.image||'',qty});
  _cardQty[id]=1; const el=$('#cq'+id); if(el) el.textContent='1';
  updateCart();toast(__('added',{n:qty}));
}

/* ----- email notification ----- */
let _emailCountToday = 0, _emailCountDate = '';
function initEmailJS(){
  if(!SETTINGS.email_enabled || !SETTINGS.email_public_key) return;
  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){ console.warn('EmailJS init failed',e); }
}
function sendOrderEmail(order){
  if(!SETTINGS.email_enabled) return;
  if(!SETTINGS.email_service_id||!SETTINGS.email_template_id||!SETTINGS.email_public_key) return;
  // init ทุกครั้งก่อนส่ง (กันกรณีที่ยังไม่ได้ init)
  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){}
  // reset daily counter
  const today = new Date().toDateString();
  if(_emailCountDate !== today){ _emailCountDate = today; _emailCountToday = 0; }
  if(_emailCountToday >= (Number(SETTINGS.email_max_per_day)||50)) return;
  const delay = (Number(SETTINGS.email_delay_min)||0) * 60000;
  setTimeout(()=>{
    const recipients = (SETTINGS.email_to||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!recipients.length) return;
    const itemLines = order.items.map(i=>`${i.name} x${i.qty} = ${money(i.unit_price*i.qty)}`).join('\n');
    const params = {
      order_no: order.order_no,
      cust_name: order.cust_name,
      cust_phone: order.cust_phone,
      items: itemLines,
      total: money(order.total),
      note: order.note||'-',
      created_at: order.created_at,
      branch: SETTINGS.store_name,
      location: '-',
      to_email: recipients[0],
      cc_emails: recipients.slice(1).join(',')
    };
    recipients.forEach(email => {
      emailjs.send(SETTINGS.email_service_id, SETTINGS.email_template_id, {...params, to_email: email})
        .then(()=>{ _emailCountToday++; console.log('Email sent to', email); })
        .catch(e=>console.warn('Email failed', e));
    });
  }, delay);
}
function submitOrder(){
  const name=$('#fName').value.trim(),phone=$('#fPhone').value.trim(),note=$('#fNote').value.trim();
  if(!name||!phone){toast(__('fill_err'));return;}
  const total=cartTotal();
  const order_no='AIS'+String(Date.now()).slice(-8);
  const order={id:nextOrderSeq++,order_no,cust_name:name,cust_phone:phone,note,
    items:JSON.parse(JSON.stringify(cart)),total,status:'new',
    branch: '-', branch_name: SETTINGS.store_name, location: '-',
    created_at:new Date().toLocaleString('th-TH')};
  ORDERS.unshift(order); 
  // ลด stock ตามที่สั่ง
  order.items.forEach(item=>{
    const prod=PRODUCTS.find(p=>p.id===item.id);
    if(prod && prod.use_stock && prod.stock!=null) prod.stock=Math.max(0,prod.stock-item.qty);
  });
  persist(); // SAVE to admin
  sendOrderEmail(order);
  const messenger_url=messengerUrl(order_no);
  const line_url=lineUrl();
  lastOrder={order_no,messenger_url,line_url};
  view='done';renderDrawer();
  cart=[];updateCart();
}

function adAt(i){ if(!SETTINGS.ads[i]) SETTINGS.ads[i]={pc:'',mobile:'',link:'',caption:''}; return SETTINGS.ads[i]; }
function imgSlot(i,which,label){
  const a=SETTINGS.ads[i]||{}; const src=a[which];
  const isUrl = src && src.startsWith('http');
  return `<div style="text-align:center">
    <div style="font-size:12px;font-weight:600;margin-bottom:5px">${label}</div>
    ${src
      ? `<img src="${src}" style="width:150px;height:78px;object-fit:cover;border-radius:8px;background:#fafbfa;display:block" onerror="this.style.opacity='.3'">`
      : `<div style="width:150px;height:78px;border:1.5px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:#bbb;font-size:12px">ไม่มีภาพ</div>`}
    <div style="display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap">
      <label style="cursor:pointer;color:var(--blue);font-size:12px">${src?'📁 เปลี่ยนไฟล์':'📁 อัปโหลด'}
        <input type="file" accept="image/*" style="display:none" onchange="setAdImg(${i},'${which}',this)"></label>
      ${src?` · <a onclick="clearAdImg(${i},'${which}')" style="color:var(--sale);font-size:12px;cursor:pointer">ลบ</a>`:''}
    </div>
    <div style="margin-top:6px;display:flex;gap:4px;align-items:center">
      <input id="url_${i}_${which}" type="url" placeholder="หรือวาง URL รูปภาพ" value="${isUrl?esc(src):''}"
        style="width:148px;border:1.5px solid var(--line);border-radius:6px;padding:5px 8px;font-size:11px"
        oninput="previewUrlImg(${i},'${which}',this.value)">
    </div>
  </div>`;
}
function previewUrlImg(i,which,url){
  const v=url.trim();
  if(!v){ return; }
  if(/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(v)||/^https?:\/\//.test(v)){
    adAt(i)[which]=v; persist(); renderHero();
    // re-render just the preview img without full re-render of admin
    const imgEl=document.querySelector(`#url_${i}_${which}`)?.closest('div[style*="text-align:center"]')?.querySelector('img');
    if(imgEl) imgEl.src=v;
  }
}
function adRow(i){
  const a=SETTINGS.ads[i]||{};
  const hasImg=a.pc||a.mobile;
  const filled=(SETTINGS.ads||[]).filter(x=>x&&(x.pc||x.mobile)).length;

function saveHeroText(){

function setAdImg(i,which,input){
  const f=input.files[0]; if(!f) return;
  const maxW = which==='pc' ? 1240 : 800;
  const maxH = which==='pc' ? 500 : 800;
  const sizeKB = f.size/1024;
  const quality = sizeKB > 500 ? 0.65 : 0.8;
  resizeImage(f, maxW, maxH, quality, (dataUrl)=>{
    adAt(i)[which]=dataUrl;
    const kb = Math.round(dataUrl.length*0.75/1024);
    toast(`✓ อัปโหลดภาพแล้ว (~${kb} KB)`);
    persist(); renderHero(); renderHeaderAdmin();
  });
}
function clearAdImg(i,which){ if(SETTINGS.ads[i]){SETTINGS.ads[i][which]=''; persist();renderHero(); renderHeaderAdmin();} }
function setAdsFit(v){ SETTINGS.ads_fit=v; persist(); renderHero(); }
function updateAd(i,key,val){ adAt(i)[key]=val; persist();renderHero(); }
function removeAdSet(i){ SETTINGS.ads.splice(i,1); persist();renderHero(); renderHeaderAdmin(); }
function moveAd(i,d){
  const j=i+d; if(j<0||j>4) return;
  adAt(i); adAt(j); // ensure both exist
  const a=SETTINGS.ads; [a[i],a[j]]=[a[j],a[i]]; persist();renderHero(); renderHeaderAdmin();
}

function resizeImage(file, maxW, maxH, quality, cb){
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width, h=img.height;
      if(w>maxW||h>maxH){
        const ratio=Math.min(maxW/w, maxH/h);
        w=Math.round(w*ratio); h=Math.round(h*ratio);
      }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      // ตรวจว่ามี transparency (PNG/WebP/GIF)
      const isTransparent = file.type==='image/png'||file.type==='image/webp'||file.type==='image/gif';
      if(isTransparent){
        // วาดบน background สีขาว แล้ว save เป็น JPEG เพื่อลดขนาด
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        cb(canvas.toDataURL('image/jpeg', quality));
      } else {
        ctx.fillStyle='#ffffff';
        ctx.fillRect(0,0,w,h);
        ctx.drawImage(img,0,0,w,h);
        cb(canvas.toDataURL('image/jpeg', quality));
      }
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function previewImgUrl(url){
  const v=(url||'').trim();
  if(!v) return;
  $('#m_img').value=v;
  const pv=$('#m_prev'); pv.src=v; pv.style.display='block';
  const hint=document.getElementById('m_img_hint');
  if(hint) hint.textContent='✓ ใช้ URL: '+v.slice(0,60)+(v.length>60?'...':'');
}
function previewImg(input){
  const f=input.files[0];if(!f)return;
  const sizeKB = f.size/1024;
  // ลดขนาดให้เล็กพอสำหรับ Firebase (<100KB ต่อรูป)
  const quality = sizeKB > 200 ? 0.5 : 0.65;
  resizeImage(f, 600, 600, quality, (dataUrl)=>{
    $('#m_img').value=dataUrl;
    const pv=$('#m_prev'); pv.src=dataUrl; pv.style.display='block';
    const kb = Math.round(dataUrl.length*0.75/1024);
    const hint = document.getElementById('m_img_hint');
    if(hint) hint.textContent = `✓ ขนาด: ~${kb} KB${kb>150?' ⚠️ ใหญ่ — แนะนำใช้ URL แทน':''}`;
  });
}

function downloadTemplate(){
  const csv='\uFEFF'+'sku,name,category,image_url,price,sale_price,discount_pct,sale_label,sale_color,badge_blink,active,sort\n'+
    'A001,AULUMU G09 RING BRACKET - BLACK,Accessories,,1790,1490,,SALE,,1,1,0\n'+
    'A002,MCDODO USB-C CABLE 1.8M,Cable,,490,190,,ส่วนลด,#e4002b,1,1,0\n';
  download('product_template.csv',csv,'text/csv;charset=utf-8');
}
function parseCSV(text){
  // simple CSV parser handling quoted fields
  text = text.replace(/^\uFEFF/,'').replace(/\r/g,'');
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else cur+=c;
    }
  }
  if(cur!=='' || row.length){ row.push(cur); rows.push(row); }
  if(!rows.length) return [];
  const head = rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.some(c=>c.trim()!=='')).map(r=>{
    const o={}; head.forEach((h,i)=>o[h]=(r[i]||'').trim()); return o;
  });
}
function doImport(){
  const f=$('#impFile').files[0];if(!f){alert('เลือกไฟล์ก่อน');return;}
  const r=new FileReader();
  r.onload=e=>{
    let added=0,failed=0;
    try{
      const recs=parseCSV(e.target.result);
      recs.forEach(rec=>{try{
        let catId=null;
        if(rec.category){let c=CATS.find(x=>x.name===rec.category);if(!c){c={id:nextCatId++,name:rec.category};CATS.push(c);}catId=c.id;}
        const price=Number(rec.price)||0,sale=rec.sale_price?Number(rec.sale_price):null;
        PRODUCTS.push({id:nextProductId++,sku:rec.sku||'',name:rec.name||'สินค้า',category_id:catId,image:rec.image_url||'',
          price,sale,disc:computeDisc(price,sale,rec.discount_pct),label:(rec.sale_label||'').trim(),color:(rec.sale_color||'').trim(),
          blink:rec.badge_blink==='0'?0:1,active:rec.active==='0'?0:1,sort:Number(rec.sort)||0});
        added++;
      }catch{failed++;}});
    }catch(err){$('#impResult').innerHTML=`<div class="hint" style="border-color:var(--sale)">อ่านไฟล์ไม่สำเร็จ</div>`;return;}
    persist();$('#impResult').innerHTML=`<div class="hint">✓ นำเข้าสำเร็จ ${added} รายการ${failed?` (ผิดพลาด ${failed})`:''}</div>`;
  };
  r.readAsText(f,'utf-8');
}

  const cfg = window.AISCloud && window.AISCloud.getConfig();

function saveCloudConfig(){
  const raw=$('#s_fbcfg').value.trim();
  if(!raw){ $('#cloud_msg').textContent='กรุณาวาง Firebase config ก่อน'; return; }
  let cfg;
  try{
    // tolerate JS-object style (unquoted keys) by trying JSON first, then a loose eval-free parse
    cfg = JSON.parse(raw);
  }catch{
    try{ cfg = JSON.parse(raw.replace(/(\w+)\s*:/g,'"$1":').replace(/'/g,'"').replace(/,(\s*})/g,'$1')); }
    catch{ $('#cloud_msg').innerHTML='<span style="color:var(--sale)">รูปแบบ config ไม่ถูกต้อง — วางทั้งก้อน { ... }</span>'; return; }
  }
  if(!cfg.apiKey||!cfg.projectId){ $('#cloud_msg').innerHTML='<span style="color:var(--sale)">config ต้องมี apiKey และ projectId</span>'; return; }
  window.AISCloud.saveConfig(cfg);
  $('#cloud_msg').textContent='บันทึกแล้ว กำลังโหลดใหม่เพื่อเชื่อมต่อ…';
  setTimeout(()=>location.reload(),800);
}

function lineUrlFrom(v){
  let s=String(v||'').trim(); if(!s) return null;
  // ถ้าเป็น URL เต็ม (lin.ee, line.me, https://) ใช้ตรงๆ ไม่แปลง
  if(/^https?:\/\//i.test(s)) return s;
  // ถ้าเป็น lin.ee โดยไม่มี https://
  if(/^lin\.ee\//i.test(s)) return 'https://'+s;
  // ถ้าเป็น @id หรือ id เปล่า
  s=s.replace(/^@/,'');
  return s ? `https://line.me/R/ti/p/@${s}` : null;
}

/* ----- persistence (IndexedDB, survives reload) ----- */
let _db=null, _saveTimer=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('ais_store_db',1);
    r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv'); };
    r.onsuccess=e=>{ _db=e.target.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
function snapshot(){
  // ไม่ส่ง ads ขึ้น Firebase — ads เก็บใน localStorage แยก
  const s={SETTINGS:JSON.parse(JSON.stringify(SETTINGS)),CATS,PRODUCTS,ORDERS,nextProductId,nextCatId,nextOrderSeq};
  s.SETTINGS.ads=[];
  // ลบรูป base64 ที่ใหญ่เกิน 100KB ออกก่อนส่ง Firebase (ใช้ URL แทน)
  s.PRODUCTS = s.PRODUCTS.map(p=>{
    if(p.image && p.image.startsWith('data:') && p.image.length > 100000){
      return {...p, image:''};  // ลบรูปใหญ่ออก เก็บข้อมูลอื่นไว้
    }
    return p;
  });
  return s;
}
function snapshotFull(){ return {SETTINGS,CATS,PRODUCTS,ORDERS,nextProductId,nextCatId,nextOrderSeq}; }
function persist(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const snap=snapshot();
    // บันทึก ads ใน localStorage แยก (ไม่ผ่าน Firebase)
    try{ localStorage.setItem('ais_ads', JSON.stringify(SETTINGS.ads)); }catch{}
    // local IndexedDB — เก็บแบบเต็ม (รวมรูปใหญ่)
    const fullSnap = snapshotFull();
    fullSnap.SETTINGS = JSON.parse(JSON.stringify(SETTINGS));
    fullSnap.SETTINGS.ads = [];
    if(_db){
      try{ _db.transaction('kv','readwrite').objectStore('kv').put(JSON.stringify(fullSnap),'state'); }
      catch(e){ console.warn('local persist failed',e); }
    }
    // Firebase — ส่งแบบไม่มีรูปใหญ่ (snap ถูก strip แล้ว)
    if(window.AISCloud && window.AISCloud.enabled){
      window.AISCloud.save(snap);
    }
  },250);
}
function applyState(d){
  if(!d) return;
  const savedAds = JSON.parse(JSON.stringify(SETTINGS.ads||[])); // เก็บ ads ไว้ก่อน
  if(d.SETTINGS)Object.assign(SETTINGS,d.SETTINGS);
  SETTINGS.ads = savedAds; // คืน ads เสมอ ไม่ใช้ค่าจาก Firebase
  if(SETTINGS.line_oa==='@aisshop' || SETTINGS.line_oa==='') SETTINGS.line_oa='@706dgnuq';
  if(d.CATS)CATS=d.CATS; if(d.PRODUCTS)PRODUCTS=d.PRODUCTS; if(d.ORDERS)ORDERS=d.ORDERS;
  if(d.nextProductId)nextProductId=d.nextProductId;
  if(d.nextCatId)nextCatId=d.nextCatId;
  if(d.nextOrderSeq)nextOrderSeq=d.nextOrderSeq;
}
// Called when cloud pushes a fresh copy (another device changed data)
function applyRemoteState(d){
  const prevOrderCount = ORDERS.length;
  applyState(d);
  const storeVisible = !$('#storeView').classList.contains('hidden');
  if(storeVisible){
    applyTheme(); renderCats(); renderGrid(); updateCart();
  } else {
    const active=document.querySelector('.side nav button.active');
    if(active) tab(active.dataset.tab);
  }
  // แจ้งเตือนเมื่อมีออร์เดอร์ใหม่
  const newOrders = ORDERS.length - prevOrderCount;
  if(newOrders > 0) toast(`🛒 มีคำสั่งซื้อใหม่ ${newOrders} รายการ`);
}
function loadState(){
  return new Promise((res)=>{
    if(!_db) return res(false);
    try{
      const tx=_db.transaction('kv','readonly');
      const rq=tx.objectStore('kv').get('state');
      rq.onsuccess=()=>{
        if(!rq.result) return res(false);
        try{ applyState(JSON.parse(rq.result)); res(true); }catch{ res(false); }
      };
      rq.onerror=()=>res(false);
    }catch{ res(false); }
  });
}
async function resetData(){
  if(!confirm('ล้างข้อมูลทั้งหมดและกลับไปค่าเริ่มต้น? (ลบสินค้า ออร์เดอร์ Ads ที่บันทึกไว้)')) return;
  await new Promise((res)=>{
    if(!_db) return res();
    try{
      const tx=_db.transaction('kv','readwrite');
      tx.objectStore('kv').delete('state');
      tx.oncomplete=()=>res(); tx.onerror=()=>res(); tx.onabort=()=>res();
    }catch{ res(); }
  });
  // also clear cloud copy so it doesn't re-sync old data back
  if(window.AISCloud && window.AISCloud.enabled){
    try{ await window.AISCloud.save({SETTINGS:undefined}); }catch{}
    // write defaults snapshot after reload instead; simplest: blank the doc
  }
  location.reload();
}

/* ----- shared utils ----- */
function download(filename,content,type){
  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

  $('#modalBg').classList.add('show');
}

    }
  }catch{}
}

/* ── visitor counter ── */
function initVisitorCounter(){
  const countEl=$('#visitorCount');
  if(!countEl) return;

  if(window.AISCloud && window.AISCloud.enabled && window.AISCloud._db){
    const vcRef = window.AISCloud._visRef;
    vcRef.get().then(snap=>{
      const prev = snap.exists ? (snap.data().count||0) : 0;
      const next = prev+1;
      vcRef.set({count:next});
      countEl.textContent=Number(next).toLocaleString('th-TH')+' ครั้ง';
    }).catch(()=>{});
    vcRef.onSnapshot(snap=>{
      if(snap.exists) countEl.textContent=Number(snap.data().count||0).toLocaleString('th-TH')+' ครั้ง';
    });
  } else {
    // Local fallback: count in this browser only
    let cnt=0;
    try{ cnt=(parseInt(localStorage.getItem('ais_visits')||'0')||0)+1; localStorage.setItem('ais_visits',cnt); }catch{}
    countEl.textContent=Number(cnt).toLocaleString('th-TH')+' ครั้ง';
  }
}

async function startup(){
  // โหลด ads จาก localStorage ก่อนเสมอ
  try{
    const savedAds = localStorage.getItem('ais_ads');
    if(savedAds){
      const parsed = JSON.parse(savedAds);
      if(parsed && parsed.some(a=>a&&(a.pc||a.mobile))) SETTINGS.ads = parsed;
    }
  }catch{}
  // 1) open local DB
  try{ await openDB(); }catch{}
  // 2) โหลดข้อมูลจาก local ก่อนเสมอ (รวมถึง ads)
  await loadState();
  // 3) connect Firebase
  let cloudOk=false;
  try{ cloudOk = await window.AISCloud.connect(); }catch{ cloudOk=false; }
  if(cloudOk && window.AISCloud.enabled){
    // sync ข้อมูลจาก cloud เฉพาะส่วนที่ไม่ใช่ ads
    const remote = await window.AISCloud.loadOnce();
    if(remote){ applyState(remote); }
    else { window.AISCloud.save(snapshot()); }
    window.AISCloud.subscribe(applyRemoteState);
    cloudBadge(true);
  } else {
    cloudBadge(false);
  }

  boot();
}
function cloudBadge(on){
  // small indicator the admin can see in settings (set a flag)
  window._cloudOn = on;
}



/* ============================================================
   AUTO BACKUP EMAIL SYSTEM
============================================================ */
let _backupTimer = null;

function initAutoBackup(){
  if(_backupTimer) clearTimeout(_backupTimer);
  if(!SETTINGS.backup_enabled || !SETTINGS.backup_email) return;
  if(!SETTINGS.email_service_id||!SETTINGS.email_template_id||!SETTINGS.email_public_key) return;
  scheduleNextBackup();
  console.log('Auto backup scheduled at', SETTINGS.backup_time, SETTINGS.backup_freq);
}

function scheduleNextBackup(){
  const now = new Date();
  const [h,m] = (SETTINGS.backup_time||'08:00').split(':').map(Number);
  const next = new Date();
  next.setHours(h, m, 0, 0);
  if(next <= now) next.setDate(next.getDate() + 1); // พรุ่งนี้ถ้าเลยเวลาแล้ว

  // ถ้า weekly ตรวจว่าวันนี้เป็นวันจันทร์ไหม
  if(SETTINGS.backup_freq === 'weekly'){
    while(next.getDay() !== 1) next.setDate(next.getDate() + 1); // หาวันจันทร์ถัดไป
  }

  const delay = next - now;
  _backupTimer = setTimeout(()=>{
    sendBackupEmail();
    scheduleNextBackup(); // ตั้งรอบถัดไป
  }, delay);
}

function sendBackupEmail(onDone){
  if(!SETTINGS.email_service_id||!SETTINGS.email_template_id||!SETTINGS.email_public_key){
    if(onDone) onDone(false,'กรุณาตั้งค่า EmailJS ก่อน');
    return;
  }
  if(!SETTINGS.backup_email){
    if(onDone) onDone(false,'กรุณาใส่ Email ปลายทาง');
    return;
  }
  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){}
  const now = new Date().toLocaleString('th-TH');
  const stTh = s=>({new:'รอดำเนินการ',contacted:'ติดต่อแล้ว',done:'สำเร็จ',cancelled:'ยกเลิก'}[s]||s);
  // สร้างสรุปออร์เดอร์แบบ readable
  let orderLines = !ORDERS.length ? '(ยังไม่มีคำสั่งซื้อ)' :
    ORDERS.slice(0,50).map((o,i)=>`${i+1}. [${o.order_no}] ${o.cust_name} ${o.cust_phone} | ${o.items.map(it=>it.name+' x'+it.qty).join(', ')} | ${money(o.total)} | ${stTh(o.status)} | ${o.created_at}`).join('\n')
    + (ORDERS.length>50 ? `\n...และอีก ${ORDERS.length-50} รายการ` : '');
  // สรุปสินค้า
  let productLines = PRODUCTS.slice(0,30).map((p,i)=>`${i+1}. [${p.sku||'-'}] ${p.name} | ${money(p.price)}${p.sale?' → '+money(p.sale):''}${p.use_stock?' | Stock:'+p.stock:''}`).join('\n')
    + (PRODUCTS.length>30 ? `\n...และอีก ${PRODUCTS.length-30} รายการ` : '');
  const params = {
    to_email: SETTINGS.backup_email,
    order_no: 'BACKUP-'+Date.now().toString().slice(-6),
    cust_name: 'Backup: '+SETTINGS.store_name,
    cust_phone: now,
    items: '=== คำสั่งซื้อ ('+ORDERS.length+' รายการ) ===\n'+orderLines+'\n\n=== สินค้า ('+PRODUCTS.length+' รายการ) ===\n'+productLines,
    total: 'ออร์เดอร์ '+ORDERS.length+' | สินค้า '+PRODUCTS.length,
    note: 'Auto Backup — '+now,
    created_at: now,
    cc_emails: ''
  };
  emailjs.send(SETTINGS.email_service_id, SETTINGS.email_template_id, params)
    .then(()=>{ console.log('Backup sent'); if(onDone) onDone(true); })
    .catch(e=>{ console.warn('Backup failed',e); if(onDone) onDone(false, e.text||e.message||'error'); });
}
