<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AIS Online Store — Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#0f5132; --green-2:#0a3d26; --lime:#a7d129; --lime-2:#8bb814;
    --ink:#1c2a22; --muted:#6b7c72; --line:#e7ece9; --bg:#f4f7f5;
    --sale:#e4002b; --card:#fff; --blue:#0866ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Prompt',sans-serif;background:var(--bg);color:var(--ink)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .hidden{display:none !important}

  /* ============ STOREFRONT ============ */
  .util{background:var(--green-2);color:#cfe3d6;font-size:13px}
  .util .wrap{max-width:1240px;margin:0 auto;display:flex;gap:22px;align-items:center;padding:9px 20px}
  .util .left-links{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
  .util .right{margin-left:auto;display:flex;gap:18px;align-items:center}
  .util .pill{background:var(--lime);color:#143d22;font-weight:600;padding:2px 9px;border-radius:5px}
  .util a{cursor:pointer}

  header{background:var(--green);color:#fff;position:sticky;top:0;z-index:40;box-shadow:0 4px 12px rgba(10,40,25,.18)}
  .nav-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
  .nav-row2{background:var(--green);padding:6px 10px;display:flex;align-items:center;gap:8px}
  .nav{max-width:1240px;margin:0 auto;display:flex;align-items:center;gap:20px;padding:12px 16px}
  .logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:26px;letter-spacing:.5px;cursor:pointer;flex-shrink:0}
  nav.menu{display:flex;gap:22px;font-weight:500;font-size:14px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex:1;min-width:0}
  nav.menu::-webkit-scrollbar{display:none}
  nav.menu a{opacity:.92;transition:.2s;padding:4px 0;cursor:pointer;white-space:nowrap;flex-shrink:0}
  nav.menu a:hover{opacity:1;color:var(--lime)}
  .nav .tools{margin-left:auto;display:flex;align-items:center;gap:14px;flex-shrink:0}
  .cart-btn{position:relative;background:rgba(255,255,255,.12);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;display:grid;place-items:center;transition:.2s;flex-shrink:0}
  .cart-btn:hover{background:var(--lime);color:#143d22}
  .cart-count{position:absolute;top:-6px;right:-6px;background:var(--sale);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:grid;place-items:center;padding:0 5px}
  @media(max-width:560px){
    .nav{gap:10px;padding:10px 12px}
    nav.menu a{font-size:13px;gap:16px}
    nav.menu{gap:16px}
  }

  .hero{background:linear-gradient(120deg,var(--green) 0%,#13633e 55%,#1a7a4c 100%);color:#fff;overflow:hidden;position:relative}
  .hero::after{content:"";position:absolute;right:-120px;top:-80px;width:420px;height:420px;background:radial-gradient(circle,rgba(167,209,41,.35),transparent 65%);pointer-events:none}
  .hero .wrap{max-width:1240px;margin:0 auto;padding:54px 20px 60px;position:relative;z-index:1}
  .hero h1{font-size:42px;font-weight:700;line-height:1.1;max-width:560px}
  .hero p{margin-top:14px;font-size:17px;opacity:.9;max-width:520px}
  .hero .badge{display:inline-block;background:var(--lime);color:#143d22;font-weight:600;padding:6px 14px;border-radius:20px;font-size:13px;margin-bottom:18px}

  /* ad slideshow */
  .slides{position:relative;width:100%;z-index:1}
  .slides .track{position:relative;width:100%;overflow:hidden;background:#0a3d26;line-height:0}
  .slides .slide{position:absolute;inset:0;opacity:0;transition:opacity .6s;pointer-events:none}
  .slides .slide.on{opacity:1}
  .slides .slide picture{display:block;width:100%}
  .slides .slide img{width:100%;height:auto;display:block;object-fit:unset}
  .slides .cap{position:absolute;left:0;right:0;bottom:0;padding:24px 28px;font-size:18px;font-weight:600;
    background:linear-gradient(transparent,rgba(8,30,18,.78));color:#fff}
  .slides .dots{position:absolute;bottom:12px;left:0;right:0;display:flex;gap:8px;justify-content:center;z-index:3}
  .slides .dots button{width:9px;height:9px;border-radius:50%;border:none;background:rgba(255,255,255,.5);padding:0}
  .slides .dots button.on{background:#fff;width:22px;border-radius:5px}
  .slides .arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.3);color:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:20px;z-index:3}
  .slides .arrow:hover{background:rgba(0,0,0,.55)}
  .slides .arrow.prev{left:14px}.slides .arrow.next{right:14px}
  @media(max-width:560px){
    .slides .track{}
    .slides .cap{font-size:14px;padding:16px 18px}
    .slides .arrow{width:32px;height:32px;font-size:16px}
  }

  .cats{max-width:1240px;margin:26px auto 6px;padding:0 20px;display:flex;gap:10px;flex-wrap:wrap}
  .chip{background:#fff;border:1.5px solid var(--line);color:var(--ink);padding:8px 18px;border-radius:30px;font-size:14px;font-weight:500;transition:.18s}
  .chip:hover{border-color:var(--lime-2)}
  .chip.active{background:var(--green);color:#fff;border-color:var(--green)}

  .grid{max-width:1240px;margin:18px auto 60px;padding:0 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:20px}
  @media(max-width:1000px){.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:680px){
    .hero h1{font-size:30px}
    .hero p{font-size:15px}
    .hero .wrap{padding:40px 18px 44px}
    .util .wrap{gap:12px;padding:8px 14px;flex-wrap:wrap}
  }
  @media(max-width:560px){.grid{grid-template-columns:1fr 1fr;gap:12px}}
  @media(max-width:380px){.grid{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;transition:.2s;position:relative}
  .card:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(15,81,50,.13)}
  .thumb{aspect-ratio:1/1;background:#fafbfa;display:grid;place-items:center;overflow:hidden;position:relative}
  .thumb img{width:100%;height:100%;object-fit:contain;padding:14px}
  .thumb .ph{color:#c4cfc8;font-size:13px}

  .ribbon{position:absolute;top:0;right:14px;background:var(--sale);color:#fff;font-weight:700;font-size:12px;text-align:center;line-height:1.15;padding:8px 7px 12px;width:46px;clip-path:polygon(0 0,100% 0,100% 100%,50% 86%,0 100%);box-shadow:0 4px 8px rgba(228,0,43,.35);z-index:2}
  .ribbon small{display:block;font-size:9px;font-weight:600;opacity:.95}
  .ribbon.blink{animation:blink 1.8s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}

  .pbody{padding:13px 14px 16px;display:flex;flex-direction:column;flex:1}
  .pname{font-size:13.5px;font-weight:500;line-height:1.4;min-height:38px;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .prices{margin-top:10px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .old{color:var(--muted);text-decoration:line-through;font-size:13px}
  .now{color:var(--green);font-weight:700;font-size:19px}
  .add{margin-top:12px;background:var(--ink);color:#fff;border:none;border-radius:10px;padding:11px;font-weight:600;font-size:13.5px;display:flex;align-items:center;justify-content:center;gap:8px;transition:.18s}
  .add:hover{background:var(--green)}
  .add svg{width:16px;height:16px}
  .card-actions{margin-top:12px;display:flex;gap:8px;align-items:stretch}
  .card-actions .add{margin-top:0;flex:1}
  .qstep{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:10px;overflow:hidden;flex-shrink:0}
  .qstep button{width:30px;border:none;background:#f7faf8;font-size:16px;cursor:pointer;color:var(--ink)}
  .qstep button:hover{background:var(--line)}
  .qstep span{min-width:26px;text-align:center;font-weight:600;font-size:13px}
  @media(max-width:560px){.card-actions{flex-direction:column}.qstep{align-self:flex-start}.card-actions .add{width:100%}}



  /* cart drawer */
  .overlay{position:fixed;inset:0;background:rgba(12,30,20,.45);z-index:60;opacity:0;pointer-events:none;transition:.25s}
  .overlay.show{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:400px;max-width:92vw;background:#fff;z-index:70;transform:translateX(100%);transition:.3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-10px 0 40px rgba(0,0,0,.2)}
  .drawer.show{transform:translateX(0)}
  .dhead{background:var(--green);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between}
  .dhead h3{font-size:18px;font-weight:600}
  .dhead button{background:none;border:none;color:#fff;font-size:24px}
  .ditems{flex:1;overflow:auto;padding:8px 16px}
  .citem{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .citem img{width:56px;height:56px;object-fit:contain;background:#fafbfa;border-radius:8px}
  .ci-name{font-size:13px;font-weight:500;line-height:1.35}
  .ci-price{color:var(--green);font-weight:600;font-size:14px;margin-top:2px}
  .qty{display:flex;align-items:center;gap:6px;margin-top:6px}
  .qty button{width:26px;height:26px;border:1px solid var(--line);background:#fff;border-radius:7px;font-size:15px}
  .qty span{min-width:24px;text-align:center;font-weight:600;font-size:13px}
  .ci-rm{margin-left:auto;background:none;border:none;color:var(--sale);font-size:12px;align-self:flex-start}
  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px}
  .dfoot{border-top:1px solid var(--line);padding:18px 20px}
  .drow{display:flex;justify-content:space-between;margin-bottom:6px;font-size:14px}
  .drow.total{font-size:18px;font-weight:700;color:var(--green);margin:10px 0}
  .checkout{width:100%;background:var(--lime);color:#143d22;border:none;border-radius:11px;padding:14px;font-weight:700;font-size:15px;transition:.18s}
  .checkout:hover{background:var(--lime-2)}

  .field{margin-bottom:13px}
  .field label{display:block;font-size:13px;font-weight:500;margin-bottom:5px}
  .field input,.field textarea,.field select{width:100%;border:1.5px solid var(--line);border-radius:10px;padding:11px 13px;font-size:14px}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--lime-2)}
  .back{background:none;border:none;color:var(--muted);font-size:13px;margin-bottom:8px}
  .success{text-align:center;padding:30px 20px}
  .success .ic{width:64px;height:64px;background:#e8f5ec;border-radius:50%;display:grid;place-items:center;margin:0 auto 14px;font-size:30px}
  .fb-btn{display:inline-flex;align-items:center;gap:8px;background:var(--blue);color:#fff;border:none;border-radius:11px;padding:13px 22px;font-weight:600;font-size:14px;margin-top:8px}
  .chat-btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:11px;padding:14px;font-weight:600;font-size:14px;color:#fff;transition:.18s}
  .chat-btn.fb{background:var(--blue)} .chat-btn.fb:hover{background:#0653d6}
  .chat-btn.line{background:#06c755} .chat-btn.line:hover{background:#05a948}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:13px 22px;border-radius:30px;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:200}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* ============ ADMIN ============ */
  #adminView{min-height:100vh}
  .admin-wrap{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
  .side{background:var(--green-2);color:#cfe3d6;padding:22px 16px;position:sticky;top:0;height:100vh}
  .side .brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:22px;color:#fff;margin-bottom:30px;padding-left:8px}
  .side .brand svg{width:38px;height:24px}
  .side nav button{width:100%;text-align:left;background:none;border:none;color:#cfe3d6;padding:12px 14px;border-radius:10px;font-size:15px;display:flex;align-items:center;gap:11px;margin-bottom:4px;transition:.15s}
  .side nav button:hover{background:rgba(255,255,255,.08);color:#fff}
  .side nav button.active{background:var(--lime);color:var(--green-2);font-weight:600}
  .side .exit{position:absolute;bottom:20px;left:16px;right:16px;background:rgba(255,255,255,.08);border:none;color:#cfe3d6;padding:11px;border-radius:10px;font-size:14px}
  .amain{padding:30px 36px}
  .page-title{font-size:26px;font-weight:600;margin-bottom:4px}
  .page-sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:30px}
  .stat{background:#fff;border-radius:16px;padding:22px;border:1px solid var(--line)}
  .stat .label{color:var(--muted);font-size:13px;margin-bottom:8px}
  .stat .num{font-size:28px;font-weight:700;color:var(--green)}
  .stat.alert .num{color:var(--sale)}
  .toolbar{display:flex;gap:10px;align-items:center;margin-bottom:18px;flex-wrap:wrap}
  .btn{background:var(--green);color:#fff;border:none;padding:10px 18px;border-radius:10px;font-size:14px;font-weight:500;display:inline-flex;align-items:center;gap:7px}
  .btn.alt{background:#fff;color:var(--ink);border:1.5px solid var(--line)}
  .btn.blue{background:var(--blue)}
  .btn.danger{background:var(--sale)}
  .btn.sm{padding:6px 12px;font-size:13px}
  .spacer{flex:1}
  .search{padding:10px 14px;border:1.5px solid var(--line);border-radius:10px;font-size:14px;min-width:200px}
  .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th{background:#f7faf8;text-align:left;padding:13px 16px;font-weight:600;color:var(--muted);font-size:12.5px;border-bottom:1px solid var(--line)}
  td{padding:13px 16px;border-bottom:1px solid var(--line);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  .pimg{width:46px;height:46px;object-fit:contain;background:#fafbfa;border-radius:8px}
  .tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
  .tag.new{background:#fde8ec;color:var(--sale)}
  .tag.contacted{background:#fff3e0;color:#b26a00}
  .tag.done{background:#e8f5ec;color:var(--green)}
  .tag.cancelled{background:#eceff1;color:#78909c}
  .pct{background:var(--sale);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700}
  .muted{color:var(--muted);font-size:13px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .check{display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:12px}
  .check input{width:auto}
  .img-prev{width:90px;height:90px;object-fit:contain;background:#fafbfa;border:1px solid var(--line);border-radius:10px;margin-top:6px}
  .order-items{background:#f7faf8;border-radius:10px;padding:12px;font-size:13px;margin:10px 0}
  .hint{background:#f0f7f3;border-left:3px solid var(--lime);padding:12px 14px;border-radius:8px;font-size:13px;color:#4a5d52;margin-bottom:16px;line-height:1.6}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(12,30,20,.5);z-index:100;display:none;place-items:center;padding:20px}
  .modal-bg.show{display:grid}
  .modal{background:#fff;border-radius:18px;width:520px;max-width:100%;max-height:90vh;overflow:auto}
  .modal h3{padding:20px 24px;border-bottom:1px solid var(--line);font-size:18px}
  .modal .mbody{padding:20px 24px}
  .modal .mfoot{padding:16px 24px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:flex-end}

  /* admin login gate */
  .gate{min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,var(--green),#1a7a4c)}
  .gate .box{background:#fff;padding:38px;border-radius:18px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .gate h1{font-size:24px;margin-bottom:4px;color:var(--green)}
  .gate p{color:var(--muted);font-size:13px;margin-bottom:22px}
  .gate input{width:100%;padding:13px;border:1.5px solid var(--line);border-radius:11px;font-size:15px;margin-bottom:14px}
  .gate .gbtn{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:11px;font-weight:600;font-size:15px}
  .gate .err{color:var(--sale);font-size:13px;margin-bottom:8px;min-height:18px}


  /* footer */
  #siteFooter{background:var(--green-2);color:#a7c4b2;padding:22px 20px;text-align:center;font-size:13px}
  .footer-inner{display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}


  /* ===== admin responsive ===== */
  @media(max-width:860px){
    .admin-wrap{grid-template-columns:1fr}
    .side{position:static;height:auto;padding:14px}
    .side .brand{margin-bottom:14px}
    .side nav{display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
    .side nav button{white-space:nowrap;margin-bottom:0;padding:9px 12px;font-size:14px}
    .side .exit{position:static;margin-top:10px;width:100%}
    .amain{padding:20px 16px}
    .stats{grid-template-columns:1fr 1fr;gap:12px}
    .panel{overflow-x:auto}
    table{min-width:640px}
    .grid2{grid-template-columns:1fr}
    .toolbar .search{min-width:0;flex:1}
  }
  @media(max-width:480px){
    .stats{grid-template-columns:1fr 1fr}
    .stat{padding:16px}.stat .num{font-size:22px}
    .page-title{font-size:22px}
    .modal{border-radius:14px}
  }
</style>
<script>
// โหลด Firebase compat แบบ async ไม่บล็อก script หลัก
function loadFirebaseCompat(){
  return new Promise((resolve)=>{
    const s1=document.createElement('script');
    s1.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js';
    s1.onload=()=>{
      const s2=document.createElement('script');
      s2.src='https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js';
      s2.onload=()=>resolve(true);
      s2.onerror=()=>resolve(false);
      document.head.appendChild(s2);
    };
    s1.onerror=()=>resolve(false);
    document.head.appendChild(s1);
  });
}
window.AISCloud = {
  ready:false, enabled:false, _db:null, _saving:false, _onRemote:null,
  getConfig(){
    try{
      const saved = localStorage.getItem('ais_fb_config');
      if(saved) return JSON.parse(saved);
      return {
        apiKey: "AIzaSyD-ENTQbKIvtJzMFCORNBqz1IWcFf5pThU",
        authDomain: "store-207a7.firebaseapp.com",
        projectId: "store-207a7",
        storageBucket: "store-207a7.firebasestorage.app",
        messagingSenderId: "479757384853",
        appId: "1:479757384853:web:be8563fa202fd1a9746f9c"
      };
    }catch{ return null; }
  },
  saveConfig(obj){ localStorage.setItem('ais_fb_config', JSON.stringify(obj)); },
  clearConfig(){ localStorage.removeItem('ais_fb_config'); },
  async connect(){
    const cfg=this.getConfig();
    if(!cfg||!cfg.apiKey||!cfg.projectId){ this.enabled=false; this.ready=true; return false; }
    try{
      const loaded=await loadFirebaseCompat();
      if(!loaded) throw new Error('SDK load failed');
      if(!firebase.apps.length) firebase.initializeApp(cfg);
      this._db = firebase.firestore();
      // ใช้ collection แยกตาม branch — _branchId จะถูก set ใน reconnectBranch()
      const bid = (typeof _branchId !== 'undefined') ? _branchId : 'phuket';
      this._docRef = this._db.collection('branches').doc(bid).collection('stores').doc('main');
      this._visRef = this._db.collection('branches').doc(bid).collection('visitors').doc('count');
      this.enabled = true; this.ready = true;
      return true;
    }catch(e){ console.error('Firebase connect failed',e); this.enabled=false; this.ready=true; return false; }
  },
  subscribe(cb){
    if(!this.enabled||!this._docRef) return;
    this._onRemote=cb;
    this._docRef.onSnapshot((snap)=>{
      if(this._saving) return;
      if(snap.exists){
        const data=snap.data();
        if(data&&data.json) try{ cb(JSON.parse(data.json)); }catch(e){}
      }
    },(err)=>console.warn('snapshot error',err));
  },
  async save(stateObj){
    if(!this.enabled||!this._docRef) return false;
    try{
      this._saving=true;
      await this._docRef.set({ json:JSON.stringify(stateObj), updated:Date.now() });
      setTimeout(()=>{ this._saving=false; },600);
      return true;
    }catch(e){ this._saving=false; console.error('cloud save failed',e); return false; }

  async loadOnce(){
    if(!this.enabled||!this._docRef) return null;
    try{
      const snap=await this._docRef.get();
      if(snap.exists&&snap.data().json) return JSON.parse(snap.data().json);
    }catch(e){ console.warn('cloud load failed',e); }
    return null;
  }
};

function computeDisc(price,sale,given){
  if(given!==undefined&&given!==null&&given!=='') return Math.round(Number(given));
  if(sale&&price&&sale<price) return Math.round((1-sale/price)*100);

}

// Accept a bare username OR a pasted m.me / facebook.com URL and return just the username.
function normalizeFb(v){
  let s=String(v||'').trim();
  if(!s) return '';
  s=s.replace(/^https?:\/\//i,'').replace(/^www\./i,'')
     .replace(/^m\.me\//i,'').replace(/^(web\.|business\.)?facebook\.com\//i,'')
     .replace(/^messenger\.com\/t\//i,'').replace(/^@/,'');
  s=s.split(/[/?#]/)[0]; // drop any path/query/hash
  return s.trim();
}
function messengerUrl(order_no){
  const u=normalizeFb(SETTINGS.fb_username);
  return u ? `https://m.me/${u}?ref=${encodeURIComponent('order_'+order_no)}` : null;
}

let _slideTimer=null, _slideIdx=0;
function renderHero(){ return; // disabled - hero is static HTML
  void 0;
  const hero=$('#hero'); if(!hero) return;
  const ads=(SETTINGS.ads||[]).filter(a=>a&&(a.pc||a.image||a.mobile));
  // ถ้าไม่มี ads ใน SETTINGS แต่มี HTML ฝังไว้แล้ว → ไม่ทับ
  if(!ads.length && hero.querySelector('img')) return;
  const hasText = SETTINGS.hero_show_badge||SETTINGS.hero_show_title||SETTINGS.hero_show_sub;
  let html='';

  // text block (badge / title / subtitle) — each optional
  if(hasText){
    html += `<div class="wrap">
      ${SETTINGS.hero_show_badge&&SETTINGS.hero_badge?`<span class="badge">${esc(SETTINGS.hero_badge)}</span>`:''}
      ${SETTINGS.hero_show_title&&SETTINGS.hero_title?`<h1>${esc(SETTINGS.hero_title)}</h1>`:''}
      ${SETTINGS.hero_show_sub&&SETTINGS.hero_sub?`<p>${esc(SETTINGS.hero_sub)}</p>`:''}
    </div>`;
  }

  // ad slideshow — each ad can have a PC image and an optional mobile image
  if(ads.length){
    const arrows = ads.length>1 ? `
      <button class="arrow prev" onclick="slidePrev()">‹</button>
      <button class="arrow next" onclick="slideNext()">›</button>` : '';
    const dots = ads.length>1 ? `<div class="dots">${ads.map((a,i)=>`<button class="${i===0?'on':''}" onclick="slideGo(${i})"></button>`).join('')}</div>` : '';
    const slides = ads.map((a,i)=>{
      const pc=a.pc||a.image||a.mobile, mob=a.mobile||a.pc||a.image;
      // <picture> swaps to the mobile image automatically under 560px
      const inner=`<picture>
        <source media="(max-width:560px)" srcset="${mob}">
        <img src="${pc}" alt="" style="object-fit:${SETTINGS.ads_fit==='contain'?'contain':'cover'}">
      </picture>${a.caption?`<div class="cap">${esc(a.caption)}</div>`:''}`;
      const cls=`slide ${i===0?'on':''}`;
      return a.link
        ? `<a class="${cls}" href="${esc(a.link)}" target="_blank">${inner}</a>`
        : `<div class="${cls}">${inner}</div>`;
    }).join('');
    html += `<div class="slides"><div class="track" id="slideTrack">${slides}</div>${arrows}${dots}</div>`;
  }

  // if neither text nor ads, keep a minimal spacer so header isn't naked
  if(!hasText && !ads.length) html = `<div class="wrap" style="padding:30px 20px"></div>`;

  hero.innerHTML = html;
  _slideIdx = 0;
  clearInterval(_slideTimer);
  if(ads.length>1){ _slideTimer = setInterval(slideNext, 4500); }
}
function _setSlide(i){
  const track=$('#slideTrack'); if(!track) return;
  const slides=track.querySelectorAll('.slide');
  const dots=document.querySelectorAll('.slides .dots button');
  if(!slides.length) return;
  _slideIdx=(i+slides.length)%slides.length;
  slides.forEach((s,k)=>s.classList.toggle('on',k===_slideIdx));
  dots.forEach((d,k)=>d.classList.toggle('on',k===_slideIdx));
}

const _cardQty={};

function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);if(!p)return;
  const qty=_cardQty[id]||1;
  const unit=(p.sale&&p.sale<p.price)?p.sale:p.price;
  const ex=cart.find(i=>i.id===id);
  if(ex)ex.qty+=qty; else cart.push({id:p.id,name:p.name,unit_price:unit,image:p.image||'',qty});
  _cardQty[id]=1; const el=$('#cq'+id); if(el) el.textContent='1';
  updateCart();toast(__('added',{n:qty}));
}
function changeQty(id,d){const it=cart.find(i=>i.id===id);if(!it)return;it.qty+=d;if(it.qty<=0)cart=cart.filter(i=>i.id!==id);updateCart();renderDrawer();}

/* ----- email notification ----- */
let _emailCountToday = 0, _emailCountDate = '';
function initEmailJS(){
  if(!SETTINGS.email_enabled || !SETTINGS.email_public_key) return;
  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){ console.warn('EmailJS init failed',e); }
}
function sendOrderEmail(order){
  if(!SETTINGS.email_enabled) return;
  if(!SETTINGS.email_service_id||!SETTINGS.email_template_id||!SETTINGS.email_public_key) return;
  // init ทุกครั้งก่อนส่ง (กันกรณีที่ยังไม่ได้ init)
  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){}
  // reset daily counter
  const today = new Date().toDateString();
  if(_emailCountDate !== today){ _emailCountDate = today; _emailCountToday = 0; }
  if(_emailCountToday >= (Number(SETTINGS.email_max_per_day)||50)) return;
  const delay = (Number(SETTINGS.email_delay_min)||0) * 60000;
  setTimeout(()=>{
    const recipients = (SETTINGS.email_to||'').split(',').map(s=>s.trim()).filter(Boolean);
    if(!recipients.length) return;
    const itemLines = order.items.map(i=>`${i.name} x${i.qty} = ${money(i.unit_price*i.qty)}`).join('\n');
    const params = {
      order_no: order.order_no,
      cust_name: order.cust_name,
      cust_phone: order.cust_phone,
      items: itemLines,
      total: money(order.total),
      note: order.note||'-',
      created_at: order.created_at,
      branch: (_branch&&_branch.name)||'-',
      location: (_branch&&_branch.location)||'-',
      to_email: recipients[0],
      cc_emails: recipients.slice(1).join(',')
    };
    recipients.forEach(email => {
      emailjs.send(SETTINGS.email_service_id, SETTINGS.email_template_id, {...params, to_email: email})
        .then(()=>{ _emailCountToday++; console.log('Email sent to', email); })
        .catch(e=>console.warn('Email failed', e));
    });
  }, delay);
}
function submitOrder(){
  const name=$('#fName').value.trim(),phone=$('#fPhone').value.trim(),note=$('#fNote').value.trim();
  if(!name||!phone){toast(__('fill_err'));return;}
  const total=cartTotal();
  const order_no='AIS'+String(Date.now()).slice(-8);
  const order={id:nextOrderSeq++,order_no,cust_name:name,cust_phone:phone,note,
    items:JSON.parse(JSON.stringify(cart)),total,status:'new',
    branch: _branchId, branch_name: _branch.name, location: _branch.location,
    created_at:new Date().toLocaleString('th-TH')};
  ORDERS.unshift(order); 
  // ลด stock ตามที่สั่ง
  order.items.forEach(item=>{
    const prod=PRODUCTS.find(p=>p.id===item.id);
    if(prod && prod.use_stock && prod.stock!=null) prod.stock=Math.max(0,prod.stock-item.qty);
  });
  persist(); // SAVE to admin
  sendOrderEmail(order);
  const messenger_url=messengerUrl(order_no);
  const line_url=lineUrl();
  lastOrder={order_no,messenger_url,line_url};
  view='done';renderDrawer();
  cart=[];updateCart();
}

function adAt(i){ if(!SETTINGS.ads[i]) SETTINGS.ads[i]={pc:'',mobile:'',link:'',caption:''}; return SETTINGS.ads[i]; }
function imgSlot(i,which,label){
  const a=SETTINGS.ads[i]||{}; const src=a[which];
  const isUrl = src && src.startsWith('http');
  return `<div style="text-align:center">
    <div style="font-size:12px;font-weight:600;margin-bottom:5px">${label}</div>
    ${src
      ? `<img src="${src}" style="width:150px;height:78px;object-fit:cover;border-radius:8px;background:#fafbfa;display:block" onerror="this.style.opacity='.3'">`
      : `<div style="width:150px;height:78px;border:1.5px dashed var(--line);border-radius:8px;display:grid;place-items:center;color:#bbb;font-size:12px">ไม่มีภาพ</div>`}
    <div style="display:flex;gap:6px;justify-content:center;margin-top:6px;flex-wrap:wrap">
      <label style="cursor:pointer;color:var(--blue);font-size:12px">${src?'📁 เปลี่ยนไฟล์':'📁 อัปโหลด'}
        <input type="file" accept="image/*" style="display:none" onchange="setAdImg(${i},'${which}',this)"></label>
      ${src?` · <a onclick="clearAdImg(${i},'${which}')" style="color:var(--sale);font-size:12px;cursor:pointer">ลบ</a>`:''}
    </div>
    <div style="margin-top:6px;display:flex;gap:4px;align-items:center">
      <input id="url_${i}_${which}" type="url" placeholder="หรือวาง URL รูปภาพ" value="${isUrl?esc(src):''}"
        style="width:148px;border:1.5px solid var(--line);border-radius:6px;padding:5px 8px;font-size:11px"
        oninput="previewUrlImg(${i},'${which}',this.value)">
    </div>
  </div>`;
}
function previewUrlImg(i,which,url){
  const v=url.trim();
  if(!v){ return; }
  if(/^https?:\/\/.+\.(jpg|jpeg|png|gif|webp|svg)(\?.*)?$/i.test(v)||/^https?:\/\//.test(v)){
    adAt(i)[which]=v; persist(); renderHero();
    // re-render just the preview img without full re-render of admin
    const imgEl=document.querySelector(`#url_${i}_${which}`)?.closest('div[style*="text-align:center"]')?.querySelector('img');
    if(imgEl) imgEl.src=v;
  }
}
function adRow(i){

function saveHeroText(){

function setLink(key,i,field,val){ if(SETTINGS[key][i]){SETTINGS[key][i][field]=val; persist();renderHeaderLinks();} }

function previewImg(input){

function saveProduct(id){
  const name=$('#m_name').value.trim();if(!name){alert('กรุณาใส่ชื่อสินค้า');return;}
  const price=Number($('#m_price').value)||0, sale=$('#m_sale').value?Number($('#m_sale').value):null;
  const data={name,sku:$('#m_sku').value.trim(),category_id:$('#m_cat').value?Number($('#m_cat').value):null,
    image:$('#m_img').value,price,sale,disc:computeDisc(price,sale,$('#m_disc').value),
    label:$('#m_label').value.trim(), color:$('#m_color_use').checked?$('#m_color').value:'', disc_type:$('#m_disc_type').value||'percent',
    sort:Number($('#m_sort').value)||0,blink:$('#m_blink').checked?1:0,active:$('#m_active').checked?1:0,
    disc_expire:$('#m_expire').value||'',
    stock:$('#m_stock').value!==''?Number($('#m_stock').value):null,
    use_stock:$('#m_use_stock').checked?1:0};
  if(id){Object.assign(PRODUCTS.find(p=>p.id===id),data);}
  else{PRODUCTS.push({id:nextProductId++,...data});}
  persist();closeModal();renderProducts();
}

function viewOrder(id){

    [{label:'ลบคำสั่งซื้อ',cls:'danger',fn:()=>{
      if(confirm('ลบคำสั่งซื้อนี้?')){
        // คืน stock เมื่อลบออร์เดอร์
        o.items.forEach(item=>{
          const prod=PRODUCTS.find(p=>p.id===item.id);
          if(prod&&prod.stock!=null&&prod.use_stock) prod.stock+=item.qty;
        });
        ORDERS=ORDERS.filter(x=>x.id!==id);persist();closeModal();renderOrders();
      }
    }},
     {label:'บันทึกสถานะ',cls:'',fn:()=>{
       const prev=o.status, next=$('#o_status').value;
       // คืน stock เมื่อเปลี่ยนเป็น cancelled
       if(prev!=='cancelled'&&next==='cancelled'){
         o.items.forEach(item=>{
           const prod=PRODUCTS.find(p=>p.id===item.id);
           if(prod&&prod.stock!=null&&prod.use_stock) prod.stock+=item.qty;
         });
       }
       o.status=next;persist();closeModal();renderOrders();
     }}]);
}
function exportOrdersCSV(){
  const esc2=v=>`"${String(v??'').replace(/"/g,'""')}"`;
  let csv='\uFEFF'+['Order No','Date','Customer','Phone','Items','Total','Status','Note'].map(esc2).join(',')+'\n';
  ORDERS.forEach(o=>{const items=o.items.map(i=>`${i.name} x${i.qty}`).join(' | ');
    csv+=[o.order_no,o.created_at,o.cust_name,o.cust_phone,items,o.total,o.status,o.note].map(esc2).join(',')+'\n';});

function downloadTemplate(){
  const csv='\uFEFF'+'sku,name,category,image_url,price,sale_price,discount_pct,sale_label,sale_color,badge_blink,active,sort\n'+
    'A001,AULUMU G09 RING BRACKET - BLACK,Accessories,,1790,1490,,SALE,,1,1,0\n'+
    'A002,MCDODO USB-C CABLE 1.8M,Cable,,490,190,,ส่วนลด,#e4002b,1,1,0\n';
  download('product_template.csv',csv,'text/csv;charset=utf-8');
}
function parseCSV(text){
  // simple CSV parser handling quoted fields
  text = text.replace(/^\uFEFF/,'').replace(/\r/g,'');
  const rows=[]; let row=[], cur='', q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){ cur+='"'; i++; } else q=false; }
      else cur+=c;
    } else {
      if(c==='"') q=true;
      else if(c===','){ row.push(cur); cur=''; }
      else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
      else cur+=c;
    }
  }
  if(cur!=='' || row.length){ row.push(cur); rows.push(row); }
  if(!rows.length) return [];
  const head = rows.shift().map(h=>h.trim());
  return rows.filter(r=>r.some(c=>c.trim()!=='')).map(r=>{
    const o={}; head.forEach((h,i)=>o[h]=(r[i]||'').trim()); return o;
  });
}
function doImport(){
  const f=$('#impFile').files[0];if(!f){alert('เลือกไฟล์ก่อน');return;}
  const r=new FileReader();
  r.onload=e=>{
    let added=0,failed=0;
    try{
      const recs=parseCSV(e.target.result);
      recs.forEach(rec=>{try{
        let catId=null;
        if(rec.category){let c=CATS.find(x=>x.name===rec.category);if(!c){c={id:nextCatId++,name:rec.category};CATS.push(c);}catId=c.id;}
        const price=Number(rec.price)||0,sale=rec.sale_price?Number(rec.sale_price):null;
        PRODUCTS.push({id:nextProductId++,sku:rec.sku||'',name:rec.name||'สินค้า',category_id:catId,image:rec.image_url||'',
          price,sale,disc:computeDisc(price,sale,rec.discount_pct),label:(rec.sale_label||'').trim(),color:(rec.sale_color||'').trim(),
          blink:rec.badge_blink==='0'?0:1,active:rec.active==='0'?0:1,sort:Number(rec.sort)||0});
        added++;
      }catch{failed++;}});
    }catch(err){$('#impResult').innerHTML=`<div class="hint" style="border-color:var(--sale)">อ่านไฟล์ไม่สำเร็จ</div>`;return;}
    persist();$('#impResult').innerHTML=`<div class="hint">✓ นำเข้าสำเร็จ ${added} รายการ${failed?` (ผิดพลาด ${failed})`:''}</div>`;
  };
  r.readAsText(f,'utf-8');
}

function renderCloudStatus(){
  const el=$('#cloudStatus'); if(!el) return;
  const on = window.AISCloud && window.AISCloud.enabled;
  el.innerHTML = on
    ? `<span class="tag done">● เชื่อมต่อแล้ว — ข้อมูลซิงก์ข้ามเครื่อง</span>`
    : `<span class="tag cancelled">○ ยังไม่เชื่อมต่อ — เก็บเฉพาะเครื่องนี้</span>`;
  const cfg = window.AISCloud && window.AISCloud.getConfig();
  if(cfg && $('#s_fbcfg') && !$('#s_fbcfg').value) $('#s_fbcfg').value = JSON.stringify(cfg,null,2);
}
function saveCloudConfig(){
  const raw=$('#s_fbcfg').value.trim();
  if(!raw){ $('#cloud_msg').textContent='กรุณาวาง Firebase config ก่อน'; return; }
  let cfg;
  try{
    // tolerate JS-object style (unquoted keys) by trying JSON first, then a loose eval-free parse
    cfg = JSON.parse(raw);
  }catch{
    try{ cfg = JSON.parse(raw.replace(/(\w+)\s*:/g,'"$1":').replace(/'/g,'"').replace(/,(\s*})/g,'$1')); }
    catch{ $('#cloud_msg').innerHTML='<span style="color:var(--sale)">รูปแบบ config ไม่ถูกต้อง — วางทั้งก้อน { ... }</span>'; return; }
  }
  if(!cfg.apiKey||!cfg.projectId){ $('#cloud_msg').innerHTML='<span style="color:var(--sale)">config ต้องมี apiKey และ projectId</span>'; return; }
  window.AISCloud.saveConfig(cfg);
  $('#cloud_msg').textContent='บันทึกแล้ว กำลังโหลดใหม่เพื่อเชื่อมต่อ…';
  setTimeout(()=>location.reload(),800);
}

function lineUrlFrom(v){
  let s=String(v||'').trim(); if(!s) return null;
  // ถ้าเป็น URL เต็ม (lin.ee, line.me, https://) ใช้ตรงๆ ไม่แปลง
  if(/^https?:\/\//i.test(s)) return s;

  if(/^lin\.ee\//i.test(s)) return 'https://'+s;
  // ถ้าเป็น @id หรือ id เปล่า
  s=s.replace(/^@/,'');
  return s ? `https://line.me/R/ti/p/@${s}` : null;
}

/* ----- persistence (IndexedDB, survives reload) ----- */
let _db=null, _saveTimer=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('ais_store_db',1);
    r.onupgradeneeded=e=>{ const db=e.target.result; if(!db.objectStoreNames.contains('kv')) db.createObjectStore('kv'); };
    r.onsuccess=e=>{ _db=e.target.result; res(_db); };
    r.onerror=()=>rej(r.error);
  });
}
function snapshot(){
  // ไม่ส่ง ads ขึ้น Firebase — ads เก็บใน localStorage แยก
  const s={SETTINGS:JSON.parse(JSON.stringify(SETTINGS)),CATS,PRODUCTS,ORDERS,nextProductId,nextCatId,nextOrderSeq};
  s.SETTINGS.ads=[];
  return s;
}
function snapshotFull(){ return {SETTINGS,CATS,PRODUCTS,ORDERS,nextProductId,nextCatId,nextOrderSeq}; }
function persist(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const snap=snapshot();
    // บันทึก ads ใน localStorage แยก (ไม่ผ่าน Firebase)
    try{ localStorage.setItem('ais_ads', JSON.stringify(SETTINGS.ads)); }catch{}
    // local IndexedDB
    if(_db){
      try{ _db.transaction('kv','readwrite').objectStore('kv').put(JSON.stringify(snap),'state'); }
      catch(e){ console.warn('local persist failed',e); }
    }
    // Firebase (ไม่รวม ads)
    if(window.AISCloud && window.AISCloud.enabled){
      window.AISCloud.save(snap);
    }
  },250);
}
function applyState(d){
  if(!d) return;
  const savedAds = JSON.parse(JSON.stringify(SETTINGS.ads||[])); // เก็บ ads ไว้ก่อน
  if(d.SETTINGS)Object.assign(SETTINGS,d.SETTINGS);
  SETTINGS.ads = savedAds; // คืน ads เสมอ ไม่ใช้ค่าจาก Firebase
  if(SETTINGS.line_oa==='@aisshop' || SETTINGS.line_oa==='') SETTINGS.line_oa='@706dgnuq';
  if(d.CATS)CATS=d.CATS; if(d.PRODUCTS)PRODUCTS=d.PRODUCTS; if(d.ORDERS)ORDERS=d.ORDERS;
  if(d.nextProductId)nextProductId=d.nextProductId;
  if(d.nextCatId)nextCatId=d.nextCatId;
  if(d.nextOrderSeq)nextOrderSeq=d.nextOrderSeq;
}
// Called when cloud pushes a fresh copy (another device changed data)
function applyRemoteState(d){
  const prevOrderCount = ORDERS.length;
  applyState(d);
  const storeVisible = !$('#storeView').classList.contains('hidden');
  if(storeVisible){
    applyTheme(); renderCats(); renderGrid(); updateCart();
  } else {
    const active=document.querySelector('.side nav button.active');
    if(active) tab(active.dataset.tab);
  }
  // แจ้งเตือนเมื่อมีออร์เดอร์ใหม่
  const newOrders = ORDERS.length - prevOrderCount;
  if(newOrders > 0) toast(`🛒 มีคำสั่งซื้อใหม่ ${newOrders} รายการ`);
}
function loadState(){
  return new Promise((res)=>{
    if(!_db) return res(false);
    try{
      const tx=_db.transaction('kv','readonly');
      const rq=tx.objectStore('kv').get('state');
      rq.onsuccess=()=>{
        if(!rq.result) return res(false);
        try{ applyState(JSON.parse(rq.result)); res(true); }catch{ res(false); }
      };
      rq.onerror=()=>res(false);
    }catch{ res(false); }
  });
}
async function resetData(){
  if(!confirm('ล้างข้อมูลทั้งหมดและกลับไปค่าเริ่มต้น? (ลบสินค้า ออร์เดอร์ Ads ที่บันทึกไว้)')) return;
  await new Promise((res)=>{
    if(!_db) return res();
    try{
      const tx=_db.transaction('kv','readwrite');
      tx.objectStore('kv').delete('state');
      tx.oncomplete=()=>res(); tx.onerror=()=>res(); tx.onabort=()=>res();
    }catch{ res(); }
  });
  // also clear cloud copy so it doesn't re-sync old data back
  if(window.AISCloud && window.AISCloud.enabled){
    try{ await window.AISCloud.save({SETTINGS:undefined}); }catch{}
    // write defaults snapshot after reload instead; simplest: blank the doc
  }
  location.reload();
}

  const blob=new Blob([content],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=filename;a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);

/* ── visitor counter ── */
function initVisitorCounter(){
  const countEl=$('#visitorCount');
  if(!countEl) return;

  if(window.AISCloud && window.AISCloud.enabled && window.AISCloud._db){
    const vcRef = window.AISCloud._visRef;
    vcRef.get().then(snap=>{
      const prev = snap.exists ? (snap.data().count||0) : 0;
      const next = prev+1;
      vcRef.set({count:next});
      countEl.textContent=Number(next).toLocaleString('th-TH')+' ครั้ง';
    }).catch(()=>{});
    vcRef.onSnapshot(snap=>{
      if(snap.exists) countEl.textContent=Number(snap.data().count||0).toLocaleString('th-TH')+' ครั้ง';
    });
  } else {
    // Local fallback: count in this browser only
    let cnt=0;
    try{ cnt=(parseInt(localStorage.getItem('ais_visits')||'0')||0)+1; localStorage.setItem('ais_visits',cnt); }catch{}
    countEl.textContent=Number(cnt).toLocaleString('th-TH')+' ครั้ง';
  }
}

async function startup(){
  // โหลด ads จาก localStorage ก่อนเสมอ
  try{
    const savedAds = localStorage.getItem('ais_ads');
    if(savedAds){
      const parsed = JSON.parse(savedAds);
      if(parsed && parsed.some(a=>a&&(a.pc||a.mobile))) SETTINGS.ads = parsed;
    }
  }catch{}
  // 1) open local DB
  try{ await openDB(); }catch{}
  // 2) โหลดข้อมูลจาก local ก่อนเสมอ (รวมถึง ads)
  await loadState();
  // 3) try Firebase — ใช้แค่ realtime subscribe สำหรับ orders
  let cloudOk=false;
  try{ cloudOk = await (window.AISCloudReady || Promise.resolve(false)); }catch{ cloudOk=false; }
  if(cloudOk && window.AISCloud.enabled){
    // sync ข้อมูลจาก cloud เฉพาะส่วนที่ไม่ใช่ ads
    const remote = await window.AISCloud.loadOnce();
    if(remote){ applyState(remote); }
    else { window.AISCloud.save(snapshot()); }
    window.AISCloud.subscribe(applyRemoteState);
    cloudBadge(true);
  } else {
    cloudBadge(false);
  }
  applyBranchConfig();
  // แสดงชื่อ branch ใน admin
  const bl=document.getElementById('branchLabel');
  if(bl) bl.textContent=_branch?_branch.location:'';
  boot();
}

}



/* ============================================================
   AUTO BACKUP EMAIL SYSTEM
============================================================ */
let _backupTimer = null;

function initAutoBackup(){
  if(_backupTimer) clearTimeout(_backupTimer);
  if(!SETTINGS.backup_enabled || !SETTINGS.backup_email) return;
  scheduleNextBackup();
}

function scheduleNextBackup(){
  const now = new Date();
  const [h,m] = (SETTINGS.backup_time||'08:00').split(':').map(Number);
  const next = new Date();
  next.setHours(h, m, 0, 0);
  if(next <= now) next.setDate(next.getDate() + 1); // พรุ่งนี้ถ้าเลยเวลาแล้ว

  // ถ้า weekly ตรวจว่าวันนี้เป็นวันจันทร์ไหม
  if(SETTINGS.backup_freq === 'weekly'){
    while(next.getDay() !== 1) next.setDate(next.getDate() + 1); // หาวันจันทร์ถัดไป
  }

  const delay = next - now;
  _backupTimer = setTimeout(()=>{
    sendBackupEmail();
    scheduleNextBackup(); // ตั้งรอบถัดไป
  }, delay);
}

function sendBackupEmail(){
  if(!SETTINGS.email_service_id||!SETTINGS.email_template_id||!SETTINGS.email_public_key) return;
  if(!SETTINGS.backup_email) return;

  try{ emailjs.init({publicKey: SETTINGS.email_public_key}); }catch(e){}

  // สร้าง CSV
  const esc2 = v=>`"${String(v??'').replace(/"/g,'""')}"`;
  let csv = '﻿' + ['Order No','Date','Customer','Phone','Items','Total','Status','Note'].join(',') + '\n';
  ORDERS.forEach(o=>{
    const items = o.items.map(i=>`${i.name} x${i.qty}`).join(' | ');
    csv += [o.order_no,o.created_at,o.cust_name,o.cust_phone,items,o.total,o.status,o.note||''].map(esc2).join(',') + '\n';
  });

  const now = new Date().toLocaleString('th-TH');
  const params = {
    to_email: SETTINGS.backup_email,
    order_no: 'BACKUP-'+Date.now().toString().slice(-6),
    cust_name: 'Auto Backup System',
    cust_phone: '-',
    items: csv,
    total: `${ORDERS.length} orders | ${PRODUCTS.length} products`,
    note: `Auto backup sent at ${now}`,
    created_at: now,
    cc_emails: ''
  };

  emailjs.send(SETTINGS.email_service_id, SETTINGS.email_template_id, params)
    .then(()=>console.log('Backup email sent'))
    .catch(e=>console.warn('Backup email failed',e));
}
